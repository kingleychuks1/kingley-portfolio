services:
  - type: web
    name: kingley-portfolio
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: NODE_VERSION
        value: 20.11.0
    disk:
      name: portfolio-data
      mountPath: /opt/render/project/src/src/data
      sizeGB: 1
